workflows:
  ios-workflow:
    name: iOS Release Build
    max_build_duration: 30
    environment:
      vars:
        FLUTTER_VERSION: "latest"
    scripts:
      - name: Clean project
        script: |
          echo "Cleaning previous builds..."
          xcodebuild clean -project SmartShopperAI.xcodeproj -scheme SmartShopperAI
      - name: Install dependencies
        script: |
          echo "Installing dependencies..."
          swift package resolve
      - name: Build iOS
        script: |
          echo "Building iOS archive..."
          xcodebuild -project SmartShopperAI.xcodeproj -scheme SmartShopperAI -configuration Release -archivePath C:\Users\Muhsin\Desktop\SmartShopperAI/build/SmartShopperAI.xcarchive archive
    artifacts:
      - build/SmartShopperAI.xcarchive
