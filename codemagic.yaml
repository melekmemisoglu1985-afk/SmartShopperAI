workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    scripts:
      - name: Install dependencies
        script: |
          echo "Installing dependencies..."
      - name: Build iOS
        script: |
          xcodebuild -project SmartShopperAI.xcodeproj -scheme SmartShopperAI -configuration Release
    artifacts:
      - build/ios/ipa/*.ipa